[package]
name = "monitord-client"
version = "0.1.0"
edition = "2021"

[dependencies]
monitord-protocols = { path = "../monitord-protocols" }

# Transport
iceoryx2 = "0.5"
tonic = "0.12.3"

# Error handling
thiserror = "2.0.11"
anyhow = "1.0.96"

# Logging
tracing = "0.1.41"

# Utilities
futures = "0.3.31"
async-trait = "0.1.77"

[lib]
name = "monitord_client"
path = "src/lib.rs"
