syntax = "proto3";
package metrics.v1.gpu;

// Represents a snapshot of system GPUs
message Snapshot {
  repeated Gpu gpus = 1;
}

message Config {
  bool drivers = 1;
  bool engines = 2;
  bool clocks = 3;
  bool memory = 4;
  bool power = 5;
  bool thermals = 6;
  bool processes = 7;
}

// Represents a single physical GPU
message Gpu {
  string brand_name = 1; // The GPU's branding name (i.e. NVIDIA RTX 4090)
  string primary_node = 2; // The primary node for this GPU (/dev/dri/card*)
  string render_node = 3; // The render node for this GPU (/dev/dri/renderD*)

  // The GPU drivers in use (kernel, OpenGL, Vulkan)
  optional Drivers drivers = 4;

  // The GPU engines in use (3D engine, video decode/encode, compute)
  repeated Engine engines = 5;
  // The GPU clocks in use (graphics, memory, video)
  repeated Clock clocks = 6;
  // The GPU memory usage
  repeated Memory memory = 7;

  optional Power power = 8; // Power and temperatures
  repeated Thermal thermals = 9; // Temperature of the GPU in degrees Celsius

  repeated Process processes = 10; // Process information
}

message Drivers {
  string kernel = 1;
  string opengl = 2;
  string vulkan = 3;
}

// === Clocks ===

// Standardized clock domains
enum ClockDomain {
  CLOCK_DOMAIN_UNSPECIFIED = 0;
  CLOCK_DOMAIN_GRAPHICS = 1; // Core/Shader clock
  CLOCK_DOMAIN_COMPUTE = 2; // Compute clock
  CLOCK_DOMAIN_MEMORY = 3; // VRAM clock
  CLOCK_DOMAIN_VIDEO_UNIFIED = 4; // Video decode/encode clock
  CLOCK_DOMAIN_VIDEO_DECODE = 5; // Video decode clock
  CLOCK_DOMAIN_VIDEO_ENCODE = 6; // Video encode clock
  CLOCK_DOMAIN_SOC = 7; // SoC/Fabric clock
  CLOCK_DOMAIN_GT = 8; // Graphics Tile clock for i915
}

// Identifies a clock by its domain and index
message ClockIdentifier {
  ClockDomain domain = 1;
  uint32 index = 2;
}

// Represents a clock with its current and maximum frequency
message Clock {
  ClockIdentifier identifier = 1;
  uint32 current_frequency_mhz = 2;
  uint32 max_frequency_mhz = 3;
}

// === Engines ===

// The type of a GPU engine (graphics, compute, or video)
enum EngineType {
  ENGINE_TYPE_UNSPECIFIED = 0;
  ENGINE_TYPE_3D = 1; // Render / Graphics / 3D
  ENGINE_TYPE_COMPUTE = 2; // Compute / Cuda Cores / Stream Processors
  ENGINE_TYPE_COPY = 3; // DMA / Transfer / Memory Copy
  ENGINE_TYPE_MEMORY_CONTROLLER = 4; // Memory controller
  ENGINE_TYPE_VIDEO_DECODE = 5; // VCN (AMD) / NVDEC (NVIDIA) / VDBox (Intel)
  ENGINE_TYPE_VIDEO_ENCODE = 6; // VCN (AMD) / NVENC (NVIDIA) / VEBox (Intel)
  ENGINE_TYPE_VIDEO_UNIFIED = 7; // Unified video decode/encode engine
  ENGINE_TYPE_JPEG = 8; // JPEG decode/encode engine
  ENGINE_TYPE_MEDIA_CLEAR = 9; // Specialized engines (e.g., Intel SFC)
  ENGINE_TYPE_OTHER = 10; // Catch-all for vendor-specific AI or RT accelerators
}

// Identifier for a GPU engine
message EngineIdentifier {
  EngineType type = 1;
  uint32 index = 2;

  ClockIdentifier clock = 3;
}

// Represents a single engine (graphics, compute, or video)
message Engine {
  EngineIdentifier identifier = 1;
  uint64 utilization = 2;
}

// === Memory ===

// What type of memory is being used (VRAM or GTT)
enum MemoryType {
  MEMORY_TYPE_UNSPECIFIED = 0;
  MEMORY_TYPE_VRAM = 1;
  MEMORY_TYPE_GTT = 2;
}

// Represents the usage of a specific type of memory
message Memory {
  MemoryType type = 1;
  uint64 total_memory = 2;
  uint64 used_memory = 3;
}

// === Power ===

// Represents the power usage of the GPU
message Power {
  uint32 current_power_mw = 1;
  uint32 max_power_mw = 2;
  bool is_power_throttled = 3;
  bool is_thermal_throttled = 4;
}

// === Thermal ===

enum ThermalLocation {
  THERMAL_LOCATION_UNSPECIFIED = 0;
  THERMAL_LOCATION_EDGE = 1;
  THERMAL_LOCATION_HOTSPOT = 2;
  THERMAL_LOCATION_MEMORY = 3;
  THERMAL_LOCATION_VRGFX = 4; // voltage regulator for graphics
  THERMAL_LOCATION_VRSOC = 5; // voltage regulator for SoC
  THERMAL_LOCATION_VRMEM = 6; // voltage regulator for memory
}

message Thermal {
  ThermalLocation location = 1;
  uint32 current_celsius = 2;
  uint32 max_celsius = 3;
}

message Process {
  uint32 pid = 1; // Process ID
  repeated Engine engine_utilization = 2; // Utilization of each engine for this process
  uint64 vram_usage = 3;
  uint64 gtt_usage = 4;
}
