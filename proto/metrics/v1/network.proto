syntax = "proto3";
package metrics.v1.network;

message Snapshot {
  repeated Adapter adapters = 1;
}

message Config {
  bool addresses = 1;
  bool wifi_info = 2;
}

message Adapter {
  string interface_name = 1;
  string mac_address = 2;
  repeated string ipv4_addresses = 3;
  repeated string ipv6_addresses = 4;
  AdapterType adapter_type = 5;
  uint32 mtu = 6;
  bool is_up = 7;

  // Cumulative counters
  uint64 rx_bytes_total = 10;
  uint64 tx_bytes_total = 11;
  uint64 rx_packets_total = 12;
  uint64 tx_packets_total = 13;
  uint64 rx_errors_total = 14;
  uint64 tx_errors_total = 15;
  uint64 rx_drops_total = 16;
  uint64 tx_drops_total = 17;

  // Speeds
  uint64 rx_bytes_per_second = 18;
  uint64 tx_bytes_per_second = 19;

  // Wifi info
  optional WifiInfo wifi_info = 20;

  enum AdapterType {
    UNKNOWN = 0;
    ETHERNET = 1;
    WIFI = 2;
    LOOPBACK = 3;
    BRIDGE = 4;
    VIRTUAL = 5;
  }
}

message WifiInfo {
  string ssid = 1; // SSID of the Wi-Fi network
  uint32 frequency_mhz = 2; // Frequency in MHz
  uint32 link_speed_up_mbps = 3; // Upload link speed in Mbps
  uint32 link_speed_down_mbps = 4; // Download link speed in Mbps
  int32 signal_strength_dbm = 5; // Signal strength in dBm
}
