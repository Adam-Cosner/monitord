[workspace]
resolver = "2"
members = [
    "monitord-service",
    "monitord-protocols",
    "monitord-collectors",
    "monitord-client"
]

[workspace.dependencies]
tonic = "0.10"
prost = "0.12"
prost-types = "0.12"
futures = "0.3"
tokio = { version = "1.34", features = ["full"] }
tracing = "0.1"
thiserror = "1.0"
async-trait = "0.1"
