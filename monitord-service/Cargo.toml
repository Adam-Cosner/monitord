[package]
name = "monitord-service"
version = "0.1.0"
edition = "2021"

[dependencies]
# monitord crates
monitord-protocols = { path = "../monitord-protocols" }

# System information gathering
sysinfo = "0.33.1"
raw-cpuid = "11.4.0"

# IPC with iceoryx2
iceoryx2 = "0.5.0"

# Async runtime
tokio = { version = "1.43.0", features = ["full"] }

# Command-line interface
config = "0.15.8"

# Error handling
thiserror = "2.0.11"

# Logging
tracing = "0.1.41"
tracing-subscriber = "0.3.19"

# Signal handling
signal-hook = "0.3.17"

# Utilities
prost = "0.13.5"
chrono = "0.4.40"

# Unix systems
[target.'cfg(unix)'.dependencies]
daemonize = "0.5.0"
nix = "0.29.0"

# Window systems
[target.'cfg(windows)'.dependencies]
windows-service = "0.8.0"
winapi = { version = "0.3.9", features = ["winsvc"] }


[[bin]]
name = "monitord"
path = "src/main.rs"
